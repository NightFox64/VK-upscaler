<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Enhancer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f0f13; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 32px 16px; }
    h1 { font-size: 1.6rem; margin-bottom: 24px; color: #fff; }

    .drop-zone {
      width: 100%; max-width: 700px; border: 2px dashed #444; border-radius: 12px;
      padding: 40px; text-align: center; cursor: pointer; transition: border-color .2s;
      background: #1a1a22;
    }
    .drop-zone.over { border-color: #6c8fff; }
    .drop-zone input { display: none; }
    .drop-zone p { color: #888; font-size: .95rem; }
    .drop-zone p span { color: #6c8fff; text-decoration: underline; cursor: pointer; }

    .controls { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; justify-content: center; }
    button {
      padding: 10px 22px; border: none; border-radius: 8px; cursor: pointer;
      font-size: .9rem; font-weight: 600; transition: opacity .15s;
    }
    button:disabled { opacity: .4; cursor: not-allowed; }
    #btnProcess { background: #6c8fff; color: #fff; }
    #btnAbort { background: #ff6c6c; color: #fff; }
    #btnDownload { background: #4caf7d; color: #fff; }

    .progress-wrap { width: 100%; max-width: 700px; margin-top: 20px; display: none; }
    .progress-bar-bg { background: #2a2a35; border-radius: 8px; height: 10px; overflow: hidden; }
    .progress-bar { height: 100%; background: #6c8fff; width: 0%; transition: width .3s; border-radius: 8px; }
    .status-text { font-size: .85rem; color: #888; margin-top: 6px; }

    .images { display: flex; gap: 20px; margin-top: 28px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 1100px; }
    .img-card { flex: 1 1 300px; max-width: 520px; background: #1a1a22; border-radius: 12px; overflow: hidden; }
    .img-card h3 { padding: 10px 14px; font-size: .85rem; color: #888; background: #14141c; }
    .img-card img { width: 100%; display: block; max-height: 420px; object-fit: contain; background: #111; }

    .params { font-size: .8rem; color: #666; padding: 8px 14px; }
  </style>
</head>
<body>
  <h1>🖼 Image Enhancer</h1>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.bmp,.heic">
    <p>Перетащите изображение сюда или <span id="browseBtn">выберите файл</span></p>
    <p style="margin-top:8px;font-size:.8rem">JPG, PNG, BMP, HEIC · до 15 Мпк</p>
  </div>

  <div class="controls">
    <button id="btnProcess" disabled>Улучшить</button>
    <button id="btnAbort" disabled>Прервать</button>
    <button id="btnDownload" disabled>Скачать</button>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
    <div class="status-text" id="statusText">Ожидание...</div>
  </div>

  <div class="images" id="imagesSection" style="display:none">
    <div class="img-card">
      <h3>Исходное</h3>
      <img id="imgOriginal" alt="original">
    </div>
    <div class="img-card">
      <h3>Улучшенное</h3>
      <img id="imgResult" alt="result">
      <div class="params" id="paramsInfo"></div>
    </div>
  </div>

  <!-- heic2any для поддержки HEIC -->
  <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
  <script src="enhancer.js"></script>
  <script>
    const enhancer = new ImageEnhancer();
    let currentFile = null;
    let currentTaskId = null;
    let resultBlob = null;

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const btnProcess = document.getElementById('btnProcess');
    const btnAbort = document.getElementById('btnAbort');
    const btnDownload = document.getElementById('btnDownload');
    const progressWrap = document.getElementById('progressWrap');
    const progressBar = document.getElementById('progressBar');
    const statusText = document.getElementById('statusText');
    const imgOriginal = document.getElementById('imgOriginal');
    const imgResult = document.getElementById('imgResult');
    const imagesSection = document.getElementById('imagesSection');
    const paramsInfo = document.getElementById('paramsInfo');

    document.getElementById('browseBtn').onclick = () => fileInput.click();
    dropZone.onclick = (e) => { if (e.target !== document.getElementById('browseBtn')) fileInput.click(); };

    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault(); dropZone.classList.remove('over');
      const file = e.dataTransfer.files[0];
      if (file) setFile(file);
    });

    fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });

    function setFile(file) {
      currentFile = file;
      imgOriginal.src = URL.createObjectURL(file);
      imgResult.src = '';
      paramsInfo.textContent = '';
      imagesSection.style.display = 'flex';
      btnProcess.disabled = false;
      btnDownload.disabled = true;
      resultBlob = null;
      setProgress(0, 'Файл загружен');
    }

    function setProgress(pct, text) {
      progressWrap.style.display = 'block';
      progressBar.style.width = pct + '%';
      statusText.textContent = text;
    }

    // Слушаем события изменения статуса
    enhancer.addEventListener('taskStatusChanged', (e) => {
      const { taskId, status, progress } = e.detail;
      if (taskId !== currentTaskId) return;

      const labels = { queued: 'В очереди', processing: 'Обработка', done: 'Готово', error: 'Ошибка', aborted: 'Прервано' };
      setProgress(progress, `${labels[status] || status} — ${progress}%`);

      if (status === 'done') {
        btnAbort.disabled = true;
      }
      if (status === 'error' || status === 'aborted') {
        btnAbort.disabled = true;
        btnProcess.disabled = false;
        if (status === 'error') setProgress(0, 'Ошибка: ' + (e.detail.error || 'неизвестная ошибка'));
      }
    });

    // Вызываем loadResult только когда result точно записан
    enhancer.addEventListener('taskResultReady', (e) => {
      if (e.detail.taskId !== currentTaskId) return;
      loadResult();
    });

    async function loadResult() {
      try {
        resultBlob = await enhancer.getResult(currentTaskId);
        imgResult.src = URL.createObjectURL(resultBlob);
        btnDownload.disabled = false;
        btnProcess.disabled = false;

        const { params } = enhancer._tasks.get(currentTaskId).result;
        paramsInfo.textContent = `Яркость: ${params.brightnessDelta > 0 ? '+' : ''}${(params.brightnessDelta * 100).toFixed(1)}%  |  Контраст: ×${params.contrastFactor.toFixed(2)}  |  Насыщенность: ×${params.saturationFactor.toFixed(2)}`;
      } catch (e) {
        setProgress(0, 'Ошибка получения результата: ' + e.message);
      }
    }

    btnProcess.addEventListener('click', async () => {
      if (!currentFile) return;
      btnProcess.disabled = true;
      btnAbort.disabled = false;
      btnDownload.disabled = true;
      setProgress(0, 'Постановка задачи...');
      try {
        currentTaskId = await enhancer.enqueue(currentFile);
      } catch (e) {
        setProgress(0, 'Ошибка: ' + e.message);
        btnProcess.disabled = false;
        btnAbort.disabled = true;
      }
    });

    btnAbort.addEventListener('click', async () => {
      if (!currentTaskId) return;
      const ok = await enhancer.abort(currentTaskId);
      if (ok) setProgress(0, 'Задача прервана');
      btnAbort.disabled = true;
      btnProcess.disabled = false;
    });

    btnDownload.addEventListener('click', () => {
      if (!resultBlob) return;
      const a = document.createElement('a');
      a.href = URL.createObjectURL(resultBlob);
      a.download = 'enhanced.jpg';
      a.click();
    });
  </script>
</body>
</html>
